services:
  mcp-gateway:
    build: .
    container_name: mcp-gateway
    environment:
      - MCP_COMMAND=${MCP_COMMAND:-npx}
      - MCP_ARGS=${MCP_ARGS}
      - API_TOKEN=${API_TOKEN}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  gateway-net:
    driver: bridge
