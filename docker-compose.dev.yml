# Development only — exposes the gateway publicly via ngrok tunnel.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  ngrok-mcp:
    image: ngrok/ngrok:3
    container_name: mcp-gateway-ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: ["http", "mcp-gateway:3001"]
    ports:
      - "4040:4040"
    networks:
      - gateway-net
    depends_on:
      mcp-gateway:
        condition: service_healthy
    restart: "no"

networks:
  gateway-net:
    external: true
